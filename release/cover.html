<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星尘驿站 封面</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050810;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}

.cover {
  width: 900px;
  height: 600px;
  background: #050810;
  border: 1px solid rgba(0,242,255,0.15);
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

/* background stars */
.cover::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 40%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(2px 2px at 40% 90%, rgba(0,242,255,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 45%, rgba(255,255,255,0.6) 0%, transparent 100%);
  animation: twinkle 4s ease-in-out infinite alternate;
}

@keyframes twinkle {
  0% { opacity: 0.7; }
  100% { opacity: 1; }
}

/* center nebula glow */
.cover::after {
  content: '';
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(100,50,200,0.15) 0%, rgba(0,242,255,0.05) 40%, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: nebula 6s ease-in-out infinite alternate;
}

@keyframes nebula {
  0% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
}

.title-zone {
  position: relative;
  z-index: 1;
  text-align: center;
}

.stars {
  font-size: 11px;
  color: rgba(0,242,255,0.3);
  letter-spacing: 0.5em;
  margin-bottom: 12px;
  animation: starsfade 3s ease-in-out infinite alternate;
}

@keyframes starsfade {
  0% { opacity: 0.4; }
  100% { opacity: 0.9; }
}

.title-cn {
  font-size: 52px;
  font-weight: bold;
  color: #ffffff;
  letter-spacing: 0.3em;
  text-shadow:
    0 0 20px rgba(0,242,255,0.8),
    0 0 40px rgba(0,242,255,0.4),
    0 0 80px rgba(0,242,255,0.2);
  margin-bottom: 8px;
  animation: titleglow 3s ease-in-out infinite alternate;
}

@keyframes titleglow {
  0% { text-shadow: 0 0 20px rgba(0,242,255,0.6), 0 0 40px rgba(0,242,255,0.3); }
  100% { text-shadow: 0 0 30px rgba(0,242,255,1), 0 0 60px rgba(0,242,255,0.5), 0 0 100px rgba(0,242,255,0.3); }
}

.title-en {
  font-size: 14px;
  color: rgba(0,242,255,0.6);
  letter-spacing: 0.6em;
  text-transform: uppercase;
  font-weight: normal;
}

.divider {
  width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,242,255,0.4), transparent);
  position: relative;
  z-index: 1;
}

.tagline {
  position: relative;
  z-index: 1;
  font-size: 13px;
  color: rgba(180,180,200,0.7);
  letter-spacing: 0.2em;
  text-align: center;
  line-height: 1.8;
}

.npc-row {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 32px;
  margin-top: 8px;
}

.npc-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  animation: dotpulse 2s ease-in-out infinite;
}

.npc-dot:nth-child(1) { background: #00F2FF; animation-delay: 0s; box-shadow: 0 0 8px #00F2FF; }
.npc-dot:nth-child(2) { background: #FF8C00; animation-delay: 0.3s; box-shadow: 0 0 8px #FF8C00; }
.npc-dot:nth-child(3) { background: #AA64FF; animation-delay: 0.6s; box-shadow: 0 0 8px #AA64FF; }
.npc-dot:nth-child(4) { background: #5EC0D8; animation-delay: 0.9s; box-shadow: 0 0 8px #5EC0D8; }
.npc-dot:nth-child(5) { background: #FF6B9D; animation-delay: 1.2s; box-shadow: 0 0 8px #FF6B9D; }

@keyframes dotpulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.3); opacity: 1; }
}

.cta {
  position: relative;
  z-index: 1;
  font-size: 11px;
  color: rgba(0,242,255,0.4);
  letter-spacing: 0.3em;
  border: 1px solid rgba(0,242,255,0.2);
  padding: 8px 24px;
  border-radius: 2px;
  margin-top: 8px;
  text-transform: uppercase;
  animation: ctafade 2s ease-in-out infinite alternate;
}

@keyframes ctafade {
  0% { opacity: 0.5; border-color: rgba(0,242,255,0.15); }
  100% { opacity: 1; border-color: rgba(0,242,255,0.35); }
}

.genre-tag {
  position: absolute;
  bottom: 20px;
  right: 24px;
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.15em;
  z-index: 1;
}
</style>
</head>
<body>
<div class="cover">
  <div class="title-zone">
    <div class="stars">✦ &nbsp; ✦ &nbsp; ✦</div>
    <div class="title-cn">星尘驿站</div>
    <div class="title-en">Stardust Relay</div>
  </div>
  <div class="divider"></div>
  <div class="tagline">
    在深空轨道的古老中转站<br>
    为迷途的飞船与AI调制特饮<br>
    <span style="color:rgba(0,242,255,0.4); font-size:11px;">「被需要的感觉」—— 治愈系放置游戏</span>
  </div>
  <div class="npc-row">
    <div class="npc-dot"></div>
    <div class="npc-dot"></div>
    <div class="npc-dot"></div>
    <div class="npc-dot"></div>
    <div class="npc-dot"></div>
  </div>
  <div class="cta">Open in Browser &nbsp;—&nbsp; itch.io</div>
  <div class="genre-tag">INDIE &nbsp;·&nbsp; SCI-FI &nbsp;·&nbsp; RELAXING &nbsp;·&nbsp; STORY-RICH</div>
</div>
</body>
</html>
